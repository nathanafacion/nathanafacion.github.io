<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#13111c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="35"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Glow orbs -->
  <circle cx="250" cy="250" r="220" fill="#a78bfa" opacity="0.06" filter="url(#blur1)"/>
  <circle cx="950" cy="400" r="180" fill="#6366f1" opacity="0.07" filter="url(#blur1)"/>
  <circle cx="600" cy="100" r="140" fill="#818cf8" opacity="0.04" filter="url(#blur2)"/>
  <!-- Dotted grid -->
  <g fill="#2a2a3a" opacity="0.35">
    <circle cx="100" cy="100" r="1.5"/><circle cx="200" cy="100" r="1.5"/><circle cx="300" cy="100" r="1.5"/><circle cx="400" cy="100" r="1.5"/><circle cx="500" cy="100" r="1.5"/><circle cx="600" cy="100" r="1.5"/><circle cx="700" cy="100" r="1.5"/><circle cx="800" cy="100" r="1.5"/><circle cx="900" cy="100" r="1.5"/><circle cx="1000" cy="100" r="1.5"/><circle cx="1100" cy="100" r="1.5"/>
    <circle cx="100" cy="200" r="1.5"/><circle cx="200" cy="200" r="1.5"/><circle cx="300" cy="200" r="1.5"/><circle cx="400" cy="200" r="1.5"/><circle cx="500" cy="200" r="1.5"/><circle cx="600" cy="200" r="1.5"/><circle cx="700" cy="200" r="1.5"/><circle cx="800" cy="200" r="1.5"/><circle cx="900" cy="200" r="1.5"/><circle cx="1000" cy="200" r="1.5"/><circle cx="1100" cy="200" r="1.5"/>
    <circle cx="100" cy="300" r="1.5"/><circle cx="200" cy="300" r="1.5"/><circle cx="300" cy="300" r="1.5"/><circle cx="400" cy="300" r="1.5"/><circle cx="500" cy="300" r="1.5"/><circle cx="600" cy="300" r="1.5"/><circle cx="700" cy="300" r="1.5"/><circle cx="800" cy="300" r="1.5"/><circle cx="900" cy="300" r="1.5"/><circle cx="1000" cy="300" r="1.5"/><circle cx="1100" cy="300" r="1.5"/>
    <circle cx="100" cy="400" r="1.5"/><circle cx="200" cy="400" r="1.5"/><circle cx="300" cy="400" r="1.5"/><circle cx="400" cy="400" r="1.5"/><circle cx="500" cy="400" r="1.5"/><circle cx="600" cy="400" r="1.5"/><circle cx="700" cy="400" r="1.5"/><circle cx="800" cy="400" r="1.5"/><circle cx="900" cy="400" r="1.5"/><circle cx="1000" cy="400" r="1.5"/><circle cx="1100" cy="400" r="1.5"/>
    <circle cx="100" cy="500" r="1.5"/><circle cx="200" cy="500" r="1.5"/><circle cx="300" cy="500" r="1.5"/><circle cx="400" cy="500" r="1.5"/><circle cx="500" cy="500" r="1.5"/><circle cx="600" cy="500" r="1.5"/><circle cx="700" cy="500" r="1.5"/><circle cx="800" cy="500" r="1.5"/><circle cx="900" cy="500" r="1.5"/><circle cx="1000" cy="500" r="1.5"/><circle cx="1100" cy="500" r="1.5"/>
  </g>
  <!-- Title -->
  <text x="80" y="155" font-family="Inter, sans-serif" font-size="20" fill="#8888a0" font-weight="500" letter-spacing="0.08em">
    AGENTES INTELIGENTES
  </text>
  <text x="80" y="215" font-family="Inter, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.02em">
    <tspan fill="#FFD600">Rules</tspan><tspan fill="#e4e4ed">, </tspan><tspan fill="#00BFAE">Agente</tspan><tspan fill="#e4e4ed"> e </tspan><tspan fill="#FF4081">Skills</tspan>
  </text>
  <text x="80" y="270" font-family="Inter, sans-serif" font-size="24" fill="#8888a0" font-weight="400">
    Como cada bloco constrói IA autônoma e flexível
  </text>
  <!-- Separator line -->
  <line x1="80" y1="300" x2="600" y2="300" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
  <!-- Tags -->
  <g>
    <rect x="80" y="320" rx="12" ry="12" width="110" height="26" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <text x="135" y="338" font-family="Inter, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="500">#ia</text>
    <rect x="200" y="320" rx="12" ry="12" width="110" height="26" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <text x="255" y="338" font-family="Inter, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="500">#agentes</text>
    <rect x="320" y="320" rx="12" ry="12" width="110" height="26" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <text x="375" y="338" font-family="Inter, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="500">#skills</text>
  </g>
  <!-- Author -->
  <text x="80" y="370" font-family="Inter, sans-serif" font-size="15" fill="#8888a0">por <tspan fill="#a78bfa" font-weight="600">Nathana Facion</tspan></text>
  <!-- Border -->
  <rect x="2" y="2" width="1196" height="626" rx="12" ry="12" fill="none" stroke="#2a2a3a" stroke-width="1"/>
</svg>
