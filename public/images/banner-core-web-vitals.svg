<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#13111c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#eab308"/>
      <stop offset="100%" style="stop-color:#ca8a04"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="35"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Glow orbs -->
  <circle cx="250" cy="250" r="220" fill="#a78bfa" opacity="0.06" filter="url(#blur1)"/>
  <circle cx="950" cy="400" r="180" fill="#6366f1" opacity="0.07" filter="url(#blur1)"/>
  <circle cx="600" cy="100" r="140" fill="#818cf8" opacity="0.04" filter="url(#blur2)"/>
  
  <!-- Dotted grid -->
  <g fill="#2a2a3a" opacity="0.35">
    <circle cx="100" cy="100" r="1.5"/><circle cx="200" cy="100" r="1.5"/><circle cx="300" cy="100" r="1.5"/><circle cx="400" cy="100" r="1.5"/><circle cx="500" cy="100" r="1.5"/><circle cx="600" cy="100" r="1.5"/><circle cx="700" cy="100" r="1.5"/><circle cx="800" cy="100" r="1.5"/><circle cx="900" cy="100" r="1.5"/><circle cx="1000" cy="100" r="1.5"/><circle cx="1100" cy="100" r="1.5"/>
    <circle cx="100" cy="200" r="1.5"/><circle cx="200" cy="200" r="1.5"/><circle cx="300" cy="200" r="1.5"/><circle cx="400" cy="200" r="1.5"/><circle cx="500" cy="200" r="1.5"/><circle cx="600" cy="200" r="1.5"/><circle cx="700" cy="200" r="1.5"/><circle cx="800" cy="200" r="1.5"/><circle cx="900" cy="200" r="1.5"/><circle cx="1000" cy="200" r="1.5"/><circle cx="1100" cy="200" r="1.5"/>
    <circle cx="100" cy="300" r="1.5"/><circle cx="200" cy="300" r="1.5"/><circle cx="300" cy="300" r="1.5"/><circle cx="400" cy="300" r="1.5"/><circle cx="500" cy="300" r="1.5"/><circle cx="600" cy="300" r="1.5"/><circle cx="700" cy="300" r="1.5"/><circle cx="800" cy="300" r="1.5"/><circle cx="900" cy="300" r="1.5"/><circle cx="1000" cy="300" r="1.5"/><circle cx="1100" cy="300" r="1.5"/>
    <circle cx="100" cy="400" r="1.5"/><circle cx="200" cy="400" r="1.5"/><circle cx="300" cy="400" r="1.5"/><circle cx="400" cy="400" r="1.5"/><circle cx="500" cy="400" r="1.5"/><circle cx="600" cy="400" r="1.5"/><circle cx="700" cy="400" r="1.5"/><circle cx="800" cy="400" r="1.5"/><circle cx="900" cy="400" r="1.5"/><circle cx="1000" cy="400" r="1.5"/><circle cx="1100" cy="400" r="1.5"/>
    <circle cx="100" cy="500" r="1.5"/><circle cx="200" cy="500" r="1.5"/><circle cx="300" cy="500" r="1.5"/><circle cx="400" cy="500" r="1.5"/><circle cx="500" cy="500" r="1.5"/><circle cx="600" cy="500" r="1.5"/><circle cx="700" cy="500" r="1.5"/><circle cx="800" cy="500" r="1.5"/><circle cx="900" cy="500" r="1.5"/><circle cx="1000" cy="500" r="1.5"/><circle cx="1100" cy="500" r="1.5"/>
  </g>

  <!-- 3 Metric gauge cards -->
  <!-- LCP Card -->
  <g transform="translate(700, 120)">
    <rect x="0" y="0" width="200" height="130" rx="10" fill="#16151f" stroke="#2a2a3a" stroke-width="1.5"/>
    <!-- Green arc -->
    <path d="M 100 100 A 50 50 0 1 1 100 100.01" fill="none" stroke="#1a1a2e" stroke-width="8" stroke-linecap="round" transform="translate(0,-15)"/>
    <path d="M 55 85 A 50 50 0 0 1 145 85" fill="none" stroke="url(#greenGrad)" stroke-width="8" stroke-linecap="round" opacity="0.9" transform="translate(0,-15)"/>
    <!-- Needle indicator -->
    <circle cx="100" cy="70" r="4" fill="#22c55e"/>
    <text x="100" y="48" font-family="Fira Code, monospace" font-size="13" fill="#22c55e" text-anchor="middle" font-weight="700">1.8s</text>
    <text x="100" y="110" font-family="Inter, sans-serif" font-size="14" fill="#e4e4ed" text-anchor="middle" font-weight="700">LCP</text>
    <text x="100" y="125" font-family="Inter, sans-serif" font-size="9" fill="#555568" text-anchor="middle">Carregamento</text>
  </g>
  
  <!-- CLS Card -->
  <g transform="translate(920, 120)">
    <rect x="0" y="0" width="200" height="130" rx="10" fill="#16151f" stroke="#2a2a3a" stroke-width="1.5"/>
    <path d="M 100 100 A 50 50 0 1 1 100 100.01" fill="none" stroke="#1a1a2e" stroke-width="8" stroke-linecap="round" transform="translate(0,-15)"/>
    <path d="M 55 85 A 50 50 0 0 1 145 85" fill="none" stroke="url(#greenGrad)" stroke-width="8" stroke-linecap="round" opacity="0.9" transform="translate(0,-15)"/>
    <circle cx="100" cy="70" r="4" fill="#22c55e"/>
    <text x="100" y="48" font-family="Fira Code, monospace" font-size="13" fill="#22c55e" text-anchor="middle" font-weight="700">0.05</text>
    <text x="100" y="110" font-family="Inter, sans-serif" font-size="14" fill="#e4e4ed" text-anchor="middle" font-weight="700">CLS</text>
    <text x="100" y="125" font-family="Inter, sans-serif" font-size="9" fill="#555568" text-anchor="middle">Estabilidade</text>
  </g>
  
  <!-- INP Card -->
  <g transform="translate(810, 270)">
    <rect x="0" y="0" width="200" height="130" rx="10" fill="#16151f" stroke="#2a2a3a" stroke-width="1.5"/>
    <path d="M 100 100 A 50 50 0 1 1 100 100.01" fill="none" stroke="#1a1a2e" stroke-width="8" stroke-linecap="round" transform="translate(0,-15)"/>
    <path d="M 55 85 A 50 50 0 0 1 145 85" fill="none" stroke="url(#greenGrad)" stroke-width="8" stroke-linecap="round" opacity="0.9" transform="translate(0,-15)"/>
    <circle cx="100" cy="70" r="4" fill="#22c55e"/>
    <text x="100" y="48" font-family="Fira Code, monospace" font-size="13" fill="#22c55e" text-anchor="middle" font-weight="700">120ms</text>
    <text x="100" y="110" font-family="Inter, sans-serif" font-size="14" fill="#e4e4ed" text-anchor="middle" font-weight="700">INP</text>
    <text x="100" y="125" font-family="Inter, sans-serif" font-size="9" fill="#555568" text-anchor="middle">Interatividade</text>
  </g>

  <!-- Threshold legend -->
  <g transform="translate(720, 430)">
    <circle cx="10" cy="8" r="5" fill="#22c55e"/>
    <text x="22" y="12" font-family="Inter, sans-serif" font-size="11" fill="#8888a0">Bom</text>
    <circle cx="70" cy="8" r="5" fill="#eab308"/>
    <text x="82" y="12" font-family="Inter, sans-serif" font-size="11" fill="#8888a0">Precisa melhorar</text>
    <circle cx="210" cy="8" r="5" fill="#ef4444"/>
    <text x="222" y="12" font-family="Inter, sans-serif" font-size="11" fill="#8888a0">Ruim</text>
  </g>

  <!-- Speed visualization: loading bar -->
  <g transform="translate(700, 465)" opacity="0.35">
    <rect x="0" y="0" width="420" height="36" rx="6" fill="#16151f" stroke="#2a2a3a" stroke-width="1"/>
    <rect x="3" y="3" width="300" height="30" rx="4" fill="url(#accent)" opacity="0.3"/>
    <text x="15" y="23" font-family="Fira Code, monospace" font-size="11" fill="#a78bfa">████████████████████░░░░░░</text>
  </g>

  <!-- Tags -->
  <g>
    <rect x="80" y="450" rx="12" ry="12" width="135" height="26" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <text x="147" y="468" font-family="Inter, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="500">Web Vitals</text>
    
    <rect x="225" y="450" rx="12" ry="12" width="110" height="26" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <text x="280" y="468" font-family="Inter, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="500">Performance</text>
    
    <rect x="345" y="450" rx="12" ry="12" width="60" height="26" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <text x="375" y="468" font-family="Inter, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="500">SEO</text>
    
    <rect x="415" y="450" rx="12" ry="12" width="55" height="26" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <text x="442" y="468" font-family="Inter, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="500">UX</text>
    
    <rect x="480" y="450" rx="12" ry="12" width="80" height="26" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <text x="520" y="468" font-family="Inter, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="500">Google</text>
  </g>

  <!-- Title -->
  <text x="80" y="155" font-family="Inter, sans-serif" font-size="20" fill="#8888a0" font-weight="500" letter-spacing="0.08em">
    CORE WEB VITALS
  </text>
  <text x="80" y="215" font-family="Inter, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.02em">
    <tspan fill="#a78bfa">Rápido</tspan><tspan fill="#e4e4ed"> ou</tspan>
  </text>
  <text x="80" y="270" font-family="Inter, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.02em">
    <tspan fill="#818cf8">"parece"</tspan><tspan fill="#e4e4ed"> rápido?</tspan>
  </text>
  
  <!-- Subtitle -->
  <text x="80" y="320" font-family="Inter, sans-serif" font-size="17" fill="#8888a0" font-weight="400">
    LCP · CLS · INP — As métricas que definem
  </text>
  <text x="80" y="345" font-family="Inter, sans-serif" font-size="17" fill="#8888a0" font-weight="400">
    a experiência real do usuário
  </text>

  <!-- Separator line -->
  <line x1="80" y1="375" x2="500" y2="375" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
  
  <!-- Author -->
  <text x="80" y="410" font-family="Inter, sans-serif" font-size="15" fill="#8888a0">
    por
  </text>
  <text x="110" y="410" font-family="Inter, sans-serif" font-size="15" fill="#a78bfa" font-weight="600">
    Nathana Facion
  </text>
  
  <!-- Border -->
  <rect x="2" y="2" width="1196" height="626" rx="12" ry="12" fill="none" stroke="#2a2a3a" stroke-width="1"/>
</svg>
