<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#13111c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="accentV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="35"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Glow orbs -->
  <circle cx="200" cy="300" r="250" fill="#a78bfa" opacity="0.06" filter="url(#blur1)"/>
  <circle cx="1000" cy="150" r="180" fill="#6366f1" opacity="0.07" filter="url(#blur1)"/>
  <circle cx="800" cy="500" r="140" fill="#818cf8" opacity="0.05" filter="url(#blur2)"/>
  
  <!-- Dotted grid -->
  <g fill="#2a2a3a" opacity="0.4">
    <circle cx="100" cy="100" r="1.5"/><circle cx="200" cy="100" r="1.5"/><circle cx="300" cy="100" r="1.5"/><circle cx="400" cy="100" r="1.5"/><circle cx="500" cy="100" r="1.5"/><circle cx="600" cy="100" r="1.5"/><circle cx="700" cy="100" r="1.5"/><circle cx="800" cy="100" r="1.5"/><circle cx="900" cy="100" r="1.5"/><circle cx="1000" cy="100" r="1.5"/><circle cx="1100" cy="100" r="1.5"/>
    <circle cx="100" cy="200" r="1.5"/><circle cx="200" cy="200" r="1.5"/><circle cx="300" cy="200" r="1.5"/><circle cx="400" cy="200" r="1.5"/><circle cx="500" cy="200" r="1.5"/><circle cx="600" cy="200" r="1.5"/><circle cx="700" cy="200" r="1.5"/><circle cx="800" cy="200" r="1.5"/><circle cx="900" cy="200" r="1.5"/><circle cx="1000" cy="200" r="1.5"/><circle cx="1100" cy="200" r="1.5"/>
    <circle cx="100" cy="300" r="1.5"/><circle cx="200" cy="300" r="1.5"/><circle cx="300" cy="300" r="1.5"/><circle cx="400" cy="300" r="1.5"/><circle cx="500" cy="300" r="1.5"/><circle cx="600" cy="300" r="1.5"/><circle cx="700" cy="300" r="1.5"/><circle cx="800" cy="300" r="1.5"/><circle cx="900" cy="300" r="1.5"/><circle cx="1000" cy="300" r="1.5"/><circle cx="1100" cy="300" r="1.5"/>
    <circle cx="100" cy="400" r="1.5"/><circle cx="200" cy="400" r="1.5"/><circle cx="300" cy="400" r="1.5"/><circle cx="400" cy="400" r="1.5"/><circle cx="500" cy="400" r="1.5"/><circle cx="600" cy="400" r="1.5"/><circle cx="700" cy="400" r="1.5"/><circle cx="800" cy="400" r="1.5"/><circle cx="900" cy="400" r="1.5"/><circle cx="1000" cy="400" r="1.5"/><circle cx="1100" cy="400" r="1.5"/>
    <circle cx="100" cy="500" r="1.5"/><circle cx="200" cy="500" r="1.5"/><circle cx="300" cy="500" r="1.5"/><circle cx="400" cy="500" r="1.5"/><circle cx="500" cy="500" r="1.5"/><circle cx="600" cy="500" r="1.5"/><circle cx="700" cy="500" r="1.5"/><circle cx="800" cy="500" r="1.5"/><circle cx="900" cy="500" r="1.5"/><circle cx="1000" cy="500" r="1.5"/><circle cx="1100" cy="500" r="1.5"/>
  </g>

  <!-- Evolution timeline -->
  <g transform="translate(720, 140)">
    <!-- Timeline line -->
    <line x1="60" y1="0" x2="60" y2="340" stroke="#2a2a3a" stroke-width="2" stroke-dasharray="6,4"/>
    
    <!-- robots.txt node -->
    <circle cx="60" cy="30" r="24" fill="#16151f" stroke="#2a2a3a" stroke-width="2"/>
    <text x="60" y="35" font-family="Fira Code, monospace" font-size="11" fill="#8888a0" text-anchor="middle" font-weight="500">🤖</text>
    <text x="100" y="25" font-family="Fira Code, monospace" font-size="13" fill="#8888a0" font-weight="500">robots.txt</text>
    <text x="100" y="45" font-family="Inter, sans-serif" font-size="11" fill="#555568">1994 · Controle de acesso</text>
    
    <!-- sitemap.xml node -->
    <circle cx="60" cy="130" r="24" fill="#16151f" stroke="#2a2a3a" stroke-width="2"/>
    <text x="60" y="135" font-family="Fira Code, monospace" font-size="11" fill="#8888a0" text-anchor="middle" font-weight="500">🗺️</text>
    <text x="100" y="125" font-family="Fira Code, monospace" font-size="13" fill="#8888a0" font-weight="500">sitemap.xml</text>
    <text x="100" y="145" font-family="Inter, sans-serif" font-size="11" fill="#555568">2005 · Mapa de páginas</text>
    
    <!-- llms.txt node (highlighted) -->
    <circle cx="60" cy="240" r="28" fill="#16151f" stroke="url(#accentV)" stroke-width="3"/>
    <circle cx="60" cy="240" r="36" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.2"/>
    <text x="60" y="245" font-family="Fira Code, monospace" font-size="13" fill="#a78bfa" text-anchor="middle" font-weight="700">📄</text>
    <text x="105" y="232" font-family="Fira Code, monospace" font-size="15" fill="#a78bfa" font-weight="700">llms.txt</text>
    <text x="105" y="255" font-family="Inter, sans-serif" font-size="11" fill="#818cf8">2024 · Contexto para LLMs</text>
    
    <!-- Arrow connecting to llms.txt -->
    <path d="M 60 54 L 60 106" stroke="#2a2a3a" stroke-width="2" fill="none" marker-end="url(#arrowGray)"/>
    <path d="M 60 154 L 60 210" stroke="url(#accentV)" stroke-width="2" fill="none"/>
  </g>

  <!-- Code block preview -->
  <g transform="translate(730, 490)" opacity="0.4">
    <rect x="0" y="0" width="400" height="100" rx="8" fill="#16151f" stroke="#2a2a3a" stroke-width="1"/>
    <text x="15" y="25" font-family="Fira Code, monospace" font-size="11" fill="#a78bfa"># My Project</text>
    <text x="15" y="45" font-family="Fira Code, monospace" font-size="11" fill="#8888a0">&gt; Summary for LLMs</text>
    <text x="15" y="65" font-family="Fira Code, monospace" font-size="11" fill="#6366f1">## Docs</text>
    <text x="15" y="85" font-family="Fira Code, monospace" font-size="11" fill="#555568">- [Guide](url): Description</text>
  </g>
  
  <!-- Tags -->
  <g>
    <rect x="80" y="450" rx="12" ry="12" width="82" height="26" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <text x="121" y="468" font-family="Inter, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="500">llms.txt</text>
    
    <rect x="172" y="450" rx="12" ry="12" width="60" height="26" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <text x="202" y="468" font-family="Inter, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="500">GEO</text>
    
    <rect x="242" y="450" rx="12" ry="12" width="60" height="26" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <text x="272" y="468" font-family="Inter, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="500">SEO</text>
    
    <rect x="312" y="450" rx="12" ry="12" width="100" height="26" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <text x="362" y="468" font-family="Inter, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="500">Markdown</text>
    
    <rect x="422" y="450" rx="12" ry="12" width="55" height="26" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <text x="449" y="468" font-family="Inter, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="500">LLM</text>
  </g>

  <!-- Title -->
  <text x="80" y="170" font-family="Inter, sans-serif" font-size="22" fill="#8888a0" font-weight="500" letter-spacing="0.08em">
    DO ROBOTS.TXT AO
  </text>
  <text x="80" y="235" font-family="Inter, sans-serif" font-size="52" font-weight="800" letter-spacing="-0.02em">
    <tspan fill="#a78bfa">llms</tspan><tspan fill="#818cf8">.</tspan><tspan fill="#6366f1">txt</tspan>
  </text>
  
  <!-- Subtitle -->
  <text x="80" y="290" font-family="Inter, sans-serif" font-size="20" fill="#e4e4ed" font-weight="600">
    Generative Engine Optimization
  </text>
  <text x="80" y="330" font-family="Inter, sans-serif" font-size="16" fill="#8888a0" font-weight="400">
    Como preparar seu site para a era da IA
  </text>

  <!-- Separator line -->
  <line x1="80" y1="365" x2="500" y2="365" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
  
  <!-- Author -->
  <text x="80" y="405" font-family="Inter, sans-serif" font-size="15" fill="#8888a0">
    por
  </text>
  <text x="110" y="405" font-family="Inter, sans-serif" font-size="15" fill="#a78bfa" font-weight="600">
    Nathana Facion
  </text>
  
  <!-- Border -->
  <rect x="2" y="2" width="1196" height="626" rx="12" ry="12" fill="none" stroke="#2a2a3a" stroke-width="1"/>
</svg>
