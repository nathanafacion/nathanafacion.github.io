---
layout: default
---

<div class="post-header">
    {% if page.image %}
    <img src="{{ page.image }}" alt="{{ page.title }}" class="post-banner">
    {% endif %}
    <h1>{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%d de %B de %Y" }}</p>
    {% if page.tags.size > 0 %}
    <div class="tags">
        {% for tag in page.tags %}
        <a class="tag" href="/tags#{{ tag }}">{{ tag }}</a>
        {% endfor %}
    </div>
    {% endif %}
</div>

<div class="post-body">
    {{ content }}
</div>
